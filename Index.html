<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Convite Maria Fernanda - 15 anos</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        html, body {
            min-height: 100vh;
            min-height: 100dvh;
            background-color: #020b18; /* Azul noturno escuro */
            color: white;
            font-family: 'Cormorant Garamond', Georgia, serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Efeito de partículas de brilho no fundo */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: radial-gradient(circle, #FFD700 0%, transparent 70%);
            border-radius: 50%;
            animation: twinkle infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Container principal */
        .page {
            max-width: 500px;
            width: 90vw;
            min-height: 85vh;
            background: linear-gradient(180deg, rgba(2, 11, 24, 0.8), rgba(0, 5, 16, 0.95));
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.05);
            padding: 40px 20px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            text-align: center;
            animation: fadeIn 1.5s ease-out forwards;
            backdrop-filter: blur(5px);
        }

        /* Borda dupla decorativa */
        .page::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Textos e Títulos */
        .pre-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(10px, 3vw, 12px);
            color: #D4AF37;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .name {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(45px, 12vw, 70px);
            color: #FFD700;
            background: linear-gradient(135deg, #FFF8DC 0%, #D4AF37 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            margin-bottom: 5px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
        }

        .age {
            font-family: 'Cinzel', serif;
            font-size: clamp(16px, 5vw, 22px);
            color: #D4AF37;
            letter-spacing: 5px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .message {
            font-size: clamp(16px, 4.5vw, 20px);
            color: #E0E0E0;
            line-height: 1.5;
            font-style: italic;
            max-width: 80%;
            margin-bottom: 30px;
        }

        /* Detalhes do Evento */
        .details-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            margin-bottom: 30px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .detail-icon {
            color: #D4AF37;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .detail-title {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            color: #A9A9A9;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .detail-text {
            font-size: clamp(18px, 5vw, 22px);
            color: #FFFFFF;
            font-weight: 600;
        }

        .detail-subtext {
            font-size: 14px;
            color: #B0B0B0;
        }

        /* Divisórias */
        .divider {
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
            margin: 15px auto;
        }

        /* Botão */
        .btn {
            display: inline-block;
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            text-decoration: none;
            padding: 12px 30px;
            letter-spacing: 2px;
            border-radius: 30px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 600;
        }

        .btn:hover {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Fundo de estrelas/partículas -->
    <div class="stars" id="stars"></div>

    <div class="page">
        <div>
            <div class="pre-title">Comemore comigo os meus</div>
            <h1 class="name">Maria Fernanda</h1>
            <div class="age">15 Anos</div>
        </div>

        <div class="divider"></div>

        <p class="message">
            "Há momentos na vida que devem ser lembrados para sempre. 
            Quero que você faça parte deste dia inesquecível."
        </p>

        <div class="divider"></div>

        <div class="details-grid">
            <div class="detail-item">
                <i class="far fa-calendar-alt detail-icon"></i>
                <div class="detail-title">Data</div>
                <div class="detail-text">10 de Outubro de 2026</div>
            </div>

            <div class="detail-item">
                <i class="far fa-clock detail-icon"></i>
                <div class="detail-title">Horário</div>
                <div class="detail-text">20:00 hs</div>
            </div>

            <div class="detail-item">
                <i class="fas fa-map-marker-alt detail-icon"></i>
                <div class="detail-title">Local</div>
                <div class="detail-text">Espaço Imperial</div>
                <div class="detail-subtext">Rua das Estrelas, 123 - Centro</div>
            </div>
        </div>

        <div>
            <!-- Substitua o link do WhatsApp pelo número correto -->
            <a href="https://wa.me/5511999999999?text=Ol%C3%A1!%20Confirmo%20minha%20presen%C3%A7a%20nos%2015%20anos%20da%20Maria%20Fernanda!" target="_blank" class="btn">
                Confirmar Presença
            </a>
        </div>
    </div>

    <script>
        // Criação das partículas douradas ao fundo
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 40; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                
                // Posições aleatórias
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                // Tamanhos aleatórios
                let size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                // Animação com tempos diferentes
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = (Math.random() * 2) + 's';
                
                container.appendChild(star);
            }
        }
        
        window.onload = createStars;
    </script>
</body>
</html>
